<!doctype html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Task Alarm{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <style>
        body {
            background: radial-gradient(circle at top, #1f2937 0%, #0b1220 45%, #060b16 100%);
            min-height: 100vh;
            color: #e5e7eb;
        }
        .page-wrap {
            max-width: 1000px;
        }
        .card-soft {
            border: 1px solid rgba(148, 163, 184, 0.15);
            border-radius: 1rem;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.35);
            background-color: #111827;
            color: #e5e7eb;
        }
        .form-control,
        .form-select {
            background-color: #0b1220;
            border-color: #334155;
            color: #e5e7eb;
        }
        .form-control:focus,
        .form-select:focus {
            background-color: #0b1220;
            color: #e5e7eb;
        }
        .table {
            --bs-table-bg: transparent;
            --bs-table-color: #e5e7eb;
            --bs-table-border-color: #334155;
        }
        .text-muted {
            color: #9ca3af !important;
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark border-bottom shadow-sm" style="background-color:#0f172a;border-color:#1e293b !important;">
    <div class="container page-wrap">
        <a class="navbar-brand fw-semibold" href="{% url 'index' %}">Task Alarm</a>
        <div class="ms-auto">
            <a class="btn btn-outline-primary btn-sm" href="{% url 'voice_config' %}">Configuration voix</a>
        </div>
    </div>
</nav>

<main class="container page-wrap py-4">
    {% if messages %}
        <div class="mb-3">
            {% for message in messages %}
                <div class="alert alert-{{ message.tags|default:'info' }} mb-2" role="alert">
                    {{ message }}
                </div>
            {% endfor %}
        </div>
    {% endif %}

    {% block content %}{% endblock %}
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
